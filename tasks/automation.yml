---
- name: Create local bin directory
  file:
    path: "/home/{{ user_id }}/.local/bin"
    state: directory
    owner: "{{ user_id }}"
    group: "{{ user_id }}"
    mode: '0755'

- name: Create weekday startup script
  copy:
    dest: "/home/{{ user_id }}/.local/bin/weekday_startup.sh"
    owner: "{{ user_id }}"
    group: "{{ user_id }}"
    mode: '0755'
    content: |
      #!/bin/bash
      # Get current day of week (1=Mon, 7=Sun)
      DAY=$(date +%u)
      if [ "$DAY" -le 5 ]; then
          # Start Teams and Slack in the background
          teams-for-linux &
          slack &
      fi

- name: Create LDM setup script
  copy:
    dest: "/home/{{ user_id }}/.local/bin/ldm_setup.sh"
    owner: "{{ user_id }}"
    group: "{{ user_id }}"
    mode: '0755'
    content: |
      #!/bin/bash
      # Re-create LDM nodes
      sudo ldmtool create all
      # Mount them (if in fstab)
      sudo mount -a

- name: Allow {{ user_id }} to run ldmtool and mount without password
  copy:
    content: |
      {{ user_id }} ALL=(ALL) NOPASSWD: /usr/bin/ldmtool
      {{ user_id }} ALL=(ALL) NOPASSWD: /usr/bin/mount -a
    dest: /etc/sudoers.d/ldm-mount
    mode: '0440'
    validate: /usr/sbin/visudo -cf %s

- name: Ensure autostart directory exists
  file:
    path: "/home/{{ user_id }}/.config/autostart"
    state: directory
    owner: "{{ user_id }}"
    group: "{{ user_id }}"
    mode: '0755'

- name: Create autostart desktop entry for LDM mount
  copy:
    dest: "/home/{{ user_id }}/.config/autostart/ldm_mount.desktop"
    owner: "{{ user_id }}"
    group: "{{ user_id }}"
    mode: '0644'
    content: |
      [Desktop Entry]
      Type=Application
      Exec=/home/{{ user_id }}/.local/bin/ldm_setup.sh
      Hidden=false
      NoDisplay=false
      X-GNOME-Autostart-enabled=true
      Name=LDM Mount
      Comment=Mounts Windows Dynamic Disks at startup

- name: Configure HDD Spindown via udev rules (10 minutes)
  copy:
    dest: /etc/udev/rules.d/69-hd-spindown.rules
    mode: '0644'
    content: |
      # Set spindown for sdb (Z1E8WSJ9) and sdc (5YD37FPW)
      ACTION=="add", SUBSYSTEM=="block", ENV{ID_SERIAL_SHORT}=="Z1E8WSJ9", RUN+="/usr/bin/hdparm -S 120 /dev/%k"
      ACTION=="add", SUBSYSTEM=="block", ENV{ID_SERIAL_SHORT}=="5YD37FPW", RUN+="/usr/bin/hdparm -S 120 /dev/%k"

- name: Apply udev rules
  shell: udevadm control --reload-rules && udevadm trigger
  changed_when: false
