---
- name: Create local bin directory
  file:
    path: "/home/{{ ansible_user_id }}/.local/bin"
    state: directory
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"
    mode: '0755'

- name: Create weekday startup script
  copy:
    dest: "/home/{{ ansible_user_id }}/.local/bin/weekday_startup.sh"
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"
    mode: '0755'
    content: |
      #!/bin/bash
      # Get current day of week (1=Mon, 7=Sun)
      DAY=$(date +%u)
      if [ "$DAY" -le 5 ]; then
          # Start Teams and Slack in the background
          teams-for-linux &
          slack &
      fi

- name: Create LDM setup script
  copy:
    dest: "/home/{{ ansible_user_id }}/.local/bin/ldm_setup.sh"
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"
    mode: '0755'
    content: |
      #!/bin/bash
      # Re-create LDM nodes
      sudo ldmtool create all
      # Mount them (if in fstab)
      sudo mount -a

- name: Allow {{ ansible_user_id }} to run ldmtool and mount without password
  copy:
    content: |
      {{ ansible_user_id }} ALL=(ALL) NOPASSWD: /usr/bin/ldmtool
      {{ ansible_user_id }} ALL=(ALL) NOPASSWD: /usr/bin/mount -a
    dest: /etc/sudoers.d/ldm-mount
    mode: '0440'
    validate: /usr/sbin/visudo -cf %s

- name: Ensure autostart directory exists
  file:
    path: "/home/{{ ansible_user_id }}/.config/autostart"
    state: directory
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"
    mode: '0755'

- name: Create autostart desktop entry for LDM mount
  copy:
    dest: "/home/{{ ansible_user_id }}/.config/autostart/ldm_mount.desktop"
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"
    mode: '0644'
    content: |
      [Desktop Entry]
      Type=Application
      Exec=/home/{{ ansible_user_id }}/.local/bin/ldm_setup.sh
      Hidden=false
      NoDisplay=false
      X-GNOME-Autostart-enabled=true
      Name=LDM Mount
      Comment=Mounts Windows Dynamic Disks at startup
