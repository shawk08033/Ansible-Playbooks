---
- name: Create Git profile directories
  file:
    path: "/home/{{ user_id }}/Code/{{ item }}"
    state: directory
    owner: "{{ user_id }}"
    group: "{{ user_id }}"
    mode: '0755'
  loop:
    - Personal
    - Huckleberry

- name: Create Personal Git config
  copy:
    dest: "/home/{{ user_id }}/.gitconfig-personal"
    owner: "{{ user_id }}"
    group: "{{ user_id }}"
    mode: '0644'
    content: |
      [user]
        name = {{ user_name }}
        email = {{ email_personal_secondary }}

- name: Create Work (Huckleberry) Git config
  copy:
    dest: "/home/{{ user_id }}/.gitconfig-work"
    owner: "{{ user_id }}"
    group: "{{ user_id }}"
    mode: '0644'
    content: |
      [user]
        name = {{ user_name }}
        email = {{ email_work }}

- name: Configure main .gitconfig with includeIf
  blockinfile:
    path: "/home/{{ user_id }}/.gitconfig"
    owner: "{{ user_id }}"
    group: "{{ user_id }}"
    mode: '0644'
    create: yes
    block: |
      [user]
        name = {{ user_name }}
        email = {{ email_personal_primary }}

      [includeIf "gitdir:~/Code/Personal/"]
        path = ~/.gitconfig-personal

      [includeIf "gitdir:~/Code/Huckleberry/"]
        path = ~/.gitconfig-work
