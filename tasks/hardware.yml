---
- name: Detect Hardware
  shell: |
    lspci | grep -iE "vga|3d|display"
    lsusb | grep -iE "razer|insta360"
  register: hw_info
  changed_when: false
  ignore_errors: yes

- name: Install Drivers and Hardware Tools
  pacman:
    name:
      - intel-media-driver
      - libva-intel-driver
      - vulkan-intel
      - openrazer-daemon
      - python-openrazer
      - v4l2loopback-dkms
      - v4l2loopback-utils
      - hdparm
    state: present

- name: Ensure plugdev group exists
  group:
    name: plugdev
    state: present

- name: Add user to necessary groups for hardware access
  user:
    name: "{{ user_id }}"
    groups: plugdev,video,gamemode
    append: yes

- name: Ensure OpenRazer daemon is enabled
  systemd:
    name: openrazer-daemon
    enabled: yes
    scope: user
  become: false
  ignore_errors: yes

- name: Configure v4l2loopback for Full HD (1920x1080)
  copy:
    dest: /etc/modprobe.d/v4l2loopback.conf
    content: |
      # Virtual Camera for Insta360 Link 2C
      options v4l2loopback devices=1 video_nr=10 card_label="Virtual Camera" exclusive_caps=1 max_width=1920 max_height=1080
    owner: root
    group: root
    mode: '0644'

- name: Load v4l2loopback module
  modprobe:
    name: v4l2loopback
    state: present
    params: 'devices=1 video_nr=10 card_label="Virtual Camera" exclusive_caps=1 max_width=1920 max_height=1080'
