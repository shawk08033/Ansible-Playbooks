---
- name: Install official repository applications
  pacman:
    name:
      - steam
      - telegram-desktop
      - teams-for-linux
      - heroic-games-launcher
      - lutris
      - protonup-qt
      - wine-staging
      - winetricks
      - flameshot
      - gnome-keyring
      - libsecret
      - discord
      - giflib
      - lib32-giflib
      - libpng
      - lib32-libpng
      - libldap
      - lib32-libldap
      - gnutls
      - lib32-gnutls
      - mpg123
      - lib32-mpg123
      - openal
      - lib32-openal
      - v4l-utils
      - lib32-v4l-utils
      - libpulse
      - lib32-libpulse
      - libgpg-error
      - lib32-libgpg-error
      - alsa-plugins
      - lib32-alsa-plugins
      - alsa-lib
      - lib32-alsa-lib
      - libjpeg-turbo
      - lib32-libjpeg-turbo
      - sqlite
      - lib32-sqlite
      - libxcomposite
      - lib32-libxcomposite
      - libxinerama
      - lib32-libxinerama
      - ncurses
      - lib32-ncurses
      - ocl-icd
      - lib32-ocl-icd
      - libxslt
      - lib32-libxslt
      - libva
      - lib32-libva
      - gtk3
      - lib32-gtk3
      - gst-plugins-base-libs
      - lib32-gst-plugins-base-libs
      - vulkan-icd-loader
      - lib32-vulkan-icd-loader
    state: present
  tags: apps

- name: Remove Vesktop (replaced by official Discord)
  pacman:
    name: vesktop
    state: absent

- name: Allow {{ user_id }} to run ALL without password for AUR tasks
  copy:
    content: "{{ user_id }} ALL=(ALL) NOPASSWD: ALL"
    dest: /etc/sudoers.d/ansible-aur
    mode: '0440'
    validate: /usr/sbin/visudo -cf %s
  tags: apps

- name: Install AUR packages using paru
  become: true
  become_user: "{{ user_id }}"
  kewlfft.aur.aur:
    name:
      - google-chrome
      - cursor-bin
      - claude-desktop-bin
      - nordvpn-bin
      - slack-desktop-wayland
      - prospect-mail
      - polychromatic
      - gnome-shell-extensions
      - gnome-shell-extension-multi-monitors-add-on-git
      - gnome-shell-extension-pop-shell-git
      - pop-gtk-theme
      - pop-icon-theme
      - gnome-shell-extension-dash-to-dock
      - cc-switch-cli-bin
      - nordvpn-gui-bin
    use: paru
    state: present
    extra_args: --noconfirm
  register: aur_install
  tags: apps

- name: Remove temporary sudoers file for AUR
  file:
    path: /etc/sudoers.d/ansible-aur
    state: absent
  tags: apps

- name: Ensure Heroic config directory exists
  file:
    path: "/home/{{ user_id }}/.config/heroic"
    state: directory
    owner: "{{ user_id }}"
    group: "{{ user_id }}"
    mode: '0755'

- name: Set Heroic default paths (Game Data and Prefixes on Btrfs)
  copy:
    dest: "/home/{{ user_id }}/.config/heroic/config.json"
    owner: "{{ user_id }}"
    group: "{{ user_id }}"
    mode: '0644'
    content: |
      {
        "defaultSettings": {
          "defaultInstallPath": "/mnt/games/Heroic",
          "defaultWinePrefix": "/mnt/games/Heroic/Prefixes",
          "autoInstallDxvk": true,
          "autoInstallVkd3d": true,
          "autoInstallDxvkNvapi": true,
          "useGameMode": true,
          "wineVersion": {
            "bin": "/usr/bin/wine",
            "name": "wine-staging",
            "type": "wine",
            "wineserver": "/usr/bin/wineserver"
          }
        },
        "version": "v0"
      }

- name: Ensure Lutris config directory exists
  file:
    path: "/home/{{ user_id }}/.config/lutris"
    state: directory
    owner: "{{ user_id }}"
    group: "{{ user_id }}"
    mode: '0755'

- name: Set Lutris default paths
  copy:
    dest: "/home/{{ user_id }}/.config/lutris/lutris.conf"
    owner: "{{ user_id }}"
    group: "{{ user_id }}"
    mode: '0644'
    content: |
      [lutris]
      default_installer_path = /mnt/games/Lutris
      wine_prefix = /mnt/games/Lutris/Prefixes

- name: Ensure local applications directory exists
  file:
    path: "/home/{{ user_id }}/.local/share/applications"
    state: directory
    owner: "{{ user_id }}"
    group: "{{ user_id }}"
    mode: '0755'

- name: Ensure local icons directory exists
  file:
    path: "/home/{{ user_id }}/.local/share/icons"
    state: directory
    owner: "{{ user_id }}"
    group: "{{ user_id }}"
    mode: '0755'

- name: Create X Desktop Entry
  copy:
    dest: "/home/{{ user_id }}/.local/share/applications/x.desktop"
    owner: "{{ user_id }}"
    group: "{{ user_id }}"
    mode: '0644'
    content: |
      [Desktop Entry]
      Name=X
      Exec=google-chrome-stable --app=https://x.com
      Icon=/home/{{ user_id }}/.local/share/icons/x.png
      Type=Application
      Terminal=false
      Categories=Network;Social;
      Comment=X (Twitter) Web App

- name: Create Bluesky Desktop Entry
  copy:
    dest: "/home/{{ user_id }}/.local/share/applications/bluesky.desktop"
    owner: "{{ user_id }}"
    group: "{{ user_id }}"
    mode: '0644'
    content: |
      [Desktop Entry]
      Name=Bluesky
      Exec=google-chrome-stable --app=https://bsky.app
      Icon=/home/{{ user_id }}/.local/share/icons/bluesky.png
      Type=Application
      Terminal=false
      Categories=Network;Social;
      Comment=Bluesky Social Web App

- name: Ensure Lutris local share directory exists
  file:
    path: "/home/{{ user_id }}/.local/share/lutris"
    state: directory
    owner: "{{ user_id }}"
    group: "{{ user_id }}"
    mode: '0755'

- name: Create Steam Library directory on Btrfs
  file:
    path: "/mnt/games/Steam"
    state: directory
    owner: "{{ user_id }}"
    group: "{{ user_id }}"
    mode: '0755'
