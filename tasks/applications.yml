---
- name: Install official repository applications
  pacman:
    name:
      - steam
      - telegram-desktop
      - teams-for-linux
      - heroic-games-launcher
      - lutris
      - protonup-qt
      - wine-staging
      - winetricks
      - flameshot
      - giflib
      - lib32-giflib
      - libpng
      - lib32-libpng
      - libldap
      - lib32-libldap
      - gnutls
      - lib32-gnutls
      - mpg123
      - lib32-mpg123
      - openal
      - lib32-openal
      - v4l-utils
      - lib32-v4l-utils
      - libpulse
      - lib32-libpulse
      - libgpg-error
      - lib32-libgpg-error
      - alsa-plugins
      - lib32-alsa-plugins
      - alsa-lib
      - lib32-alsa-lib
      - libjpeg-turbo
      - lib32-libjpeg-turbo
      - sqlite
      - lib32-sqlite
      - libxcomposite
      - lib32-libxcomposite
      - libxinerama
      - lib32-libxinerama
      - ncurses
      - lib32-ncurses
      - ocl-icd
      - lib32-ocl-icd
      - libxslt
      - lib32-libxslt
      - libva
      - lib32-libva
      - gtk3
      - lib32-gtk3
      - gst-plugins-base-libs
      - lib32-gst-plugins-base-libs
      - vulkan-icd-loader
      - lib32-vulkan-icd-loader
    state: present

- name: Allow {{ user_id }} to run pacman without password for AUR tasks
  copy:
    content: "{{ user_id }} ALL=(ALL) NOPASSWD: /usr/bin/pacman"
    dest: /etc/sudoers.d/ansible-aur
    mode: '0440'
    validate: /usr/sbin/visudo -cf %s

- name: Install AUR packages using paru
  become: true
  become_user: "{{ user_id }}"
  kewlfft.aur.aur:
    name:
      - google-chrome
      - cursor-bin
      - claude-desktop-bin
      - nordvpn-bin
      - slack-desktop-wayland
      - prospect-mail
      - polychromatic
      - gnome-shell-extension-multi-monitors-add-on-git
      - cc-switch-cli-bin
      - nordvpn-gui-bin
    use: paru
    state: present
  register: aur_install

- name: Remove temporary sudoers file for AUR
  file:
    path: /etc/sudoers.d/ansible-aur
    state: absent

- name: Ensure Heroic config directory exists
  file:
    path: "/home/{{ user_id }}/.config/heroic"
    state: directory
    owner: "{{ user_id }}"
    group: "{{ user_id }}"
    mode: '0755'

- name: Set Heroic default paths (Game Data on NTFS, Prefixes on Btrfs)
  copy:
    dest: "/home/{{ user_id }}/.config/heroic/config.json"
    owner: "{{ user_id }}"
    group: "{{ user_id }}"
    mode: '0644'
    content: |
      {
        "defaultSettings": {
          "defaultInstallPath": "/mnt/games/Heroic",
          "defaultWinePrefix": "/home/{{ user_id }}/Games/Heroic/Prefixes",
          "autoInstallDxvk": true,
          "autoInstallVkd3d": true,
          "autoInstallDxvkNvapi": true,
          "useGameMode": true,
          "wineVersion": {
            "bin": "/usr/bin/wine",
            "name": "wine-staging",
            "type": "wine",
            "wineserver": "/usr/bin/wineserver"
          }
        },
        "version": "v0"
      }
