---
- name: Setup Desktop Environment
  hosts: localhost
  connection: local
  become: true
  vars_files:
    - vars/vault.yml

  tasks:
    - name: System Configuration
      include_tasks: tasks/system.yml

    - name: Hardware and Drivers
      include_tasks: tasks/hardware.yml

    - name: Network and VPN
      include_tasks: tasks/network.yml

    - name: Development Environment
      include_tasks: tasks/development.yml

    - name: Multi-profile Git Configuration
      include_tasks: tasks/git_config.yml

    - name: Applications (Official & AUR)
      include_tasks: tasks/applications.yml
      tags: apps

    - name: Desktop Environment (Hyprland & GNOME)
      include_tasks: tasks/desktop_env.yml
      tags: desktop

    - name: CLI Power User Tools
      include_tasks: tasks/cli.yml

    - name: Security and Hardening
      include_tasks: tasks/security.yml

    - name: Automation and Startup
      include_tasks: tasks/automation.yml
