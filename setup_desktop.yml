---
- name: Setup Desktop Environment
  hosts: localhost
  connection: local
  become: true
  vars:
    ansible_user_id: shaunhawk

  tasks:
    - name: Ensure multilib is enabled and system is updated
      pacman:
        update_cache: yes
        upgrade: yes

    - name: Detect Hardware
      shell: |
        lspci | grep -iE "vga|3d|display"
        lsusb | grep -iE "razer|insta360"
      register: hw_info
      changed_when: false
      ignore_errors: yes

    - name: Install official repository packages
      pacman:
        name:
          - nodejs
          - npm
          - github-cli
          - steam
          - base-devel
          - git
          - hyprland
          - cachyos-hyprland-settings
          - waybar
          - kitty
          - rofi-wayland
          - swww
          - dunst
          - xdg-desktop-portal-hyprland
          - qt5-wayland
          - qt6-wayland
          - tailscale
          - telegram-desktop
          - teams-for-linux
          - opencode
          - intel-media-driver
          - libva-intel-driver
          - vulkan-intel
          - openrazer-daemon
          - python-openrazer
          - v4l2loopback-dkms
          - v4l2loopback-utils
          - eza
          - bat
          - fzf
          - ripgrep
          - btop
          - fastfetch
          - mangohud
          - gamemode
          - docker
          - docker-compose
          - starship
          - ghostty
          - ghostty-shell-integration
        state: present

    - name: Ensure services are enabled and started
      systemd:
        name: "{{ item }}"
        enabled: yes
        state: started
      loop:
        - tailscaled
        - nordvpnd
        - docker

    - name: Configure Split Tunneling for Tailscale in NordVPN
      shell: |
        nordvpn whitelist add subnet 100.64.0.0/10
      register: nord_whitelist
      changed_when: "'is already in the whitelist' not in nord_whitelist.stdout"
      failed_when: false
      ignore_errors: yes
